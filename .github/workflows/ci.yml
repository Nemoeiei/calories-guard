name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check . --exclude main_old.py --exclude venv --exclude .venv

      - name: Run tests
        env:
          DB_MODE: local
          ALLOWED_ORIGINS: "*"
          SUPABASE_JWT_SECRET: test-secret
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-key
        run: pytest -q

  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_application_1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Copy secrets example -> secrets
        run: cp lib/config/secrets.example.dart lib/config/secrets.dart || true

      - name: Install deps
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test
