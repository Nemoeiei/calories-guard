services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: caloriesguard
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: caloriesguard_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/init_database.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caloriesguard"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_MODE: local
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: caloriesguard_dev
      DB_USER: caloriesguard
      DB_PASSWORD: dev_password
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      # These must be provided via .env or docker-compose --env-file for
      # Supabase Auth and Gemini features to work:
      SUPABASE_JWT_SECRET: "${SUPABASE_JWT_SECRET:-dev-secret-not-for-prod}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    ports:
      - "8000:8000"

volumes:
  db_data:
